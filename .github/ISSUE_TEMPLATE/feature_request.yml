name: ✨ Feature Request
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Request
        感谢您花时间为 DeepResearch 提出新功能建议！

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 提交前检查
      description: 请确认您已完成以下检查。
      options:
        - label: 我已经搜索过现有 issues，没有发现类似的功能建议
          required: true
        - label: 我已经阅读了文档和路线图
          required: false

  - type: textarea
    id: feature-description
    attributes:
      label: 功能描述
      description: 请清晰简洁地描述您希望添加的功能。
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 动机
      description: 请描述这个功能将解决什么问题，或者为什么您认为它是有用的。
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 建议的解决方案
      description: 请描述您希望这个功能如何实现。
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 请描述您考虑过的其他解决方案。
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 您认为这个功能的重要程度如何？
      options:
        - 低 - 锦上添花
        - 中 - 提升体验
        - 高 - 关键功能
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 其他补充信息
      description: 请提供任何其他相关的信息、示例或截图。
